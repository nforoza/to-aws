AWSTemplateFormatVersion: '2010-09-09'
Description: Root stack for GitHub Actions OIDC integration in AWS using separate nested CloudFormation stacks

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Child templates
        Parameters:
          - OidcTemplateUrl
          - PoliciesTemplateUrl
          - RolesTemplateUrl
      - Label:
          default: GitHub repository
        Parameters:
          - GitHubOrg
          - GitHubRepo
          - GitHubBranch
      - Label:
          default: IAM role names
        Parameters:
          - InfraRoleName
          - AppRoleName
      - Label:
          default: Deployment artifacts
        Parameters:
          - ArtifactBucketName
    ParameterLabels:
      OidcTemplateUrl:
        default: OIDC provider child template URL
      PoliciesTemplateUrl:
        default: IAM policies child template URL
      RolesTemplateUrl:
        default: IAM roles child template URL
      GitHubOrg:
        default: GitHub organization or user
      GitHubRepo:
        default: GitHub repository name
      GitHubBranch:
        default: Branch allowed to assume the roles
      InfraRoleName:
        default: Infrastructure deployment role name
      AppRoleName:
        default: Application deployment role name
      ArtifactBucketName:
        default: S3 artifact bucket name

Parameters:
  OidcTemplateUrl:
    Type: String
    Description: S3 URL of the child template that creates the GitHub OIDC provider

  PoliciesTemplateUrl:
    Type: String
    Description: S3 URL of the child template that creates IAM managed policies for GitHub workflows

  RolesTemplateUrl:
    Type: String
    Description: S3 URL of the child template that creates IAM roles for GitHub workflows

  GitHubOrg:
    Type: String
    Description: GitHub organization or user name (e.g. nforoza)

  GitHubRepo:
    Type: String
    Description: >-
      GitHub repository that will assume these roles (e.g. data-collector).
      Deploy a separate stack per repo so each gets its own scoped role.

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume the roles

  InfraRoleName:
    Type: String
    Description: >-
      IAM role name for infrastructure deployments. Include the repo name
      to avoid clashes when deploying multiple stacks (e.g. github-infra-data-collector).

  AppRoleName:
    Type: String
    Description: >-
      IAM role name for Lambda application deployments. Include the repo name
      to avoid clashes when deploying multiple stacks (e.g. github-app-data-collector).

  ArtifactBucketName:
    Type: String
    Default: ''
    Description: >-
      S3 bucket name (not ARN) used to store deployment artifacts.
      The template builds the ARN internally. Leave empty to omit S3 access.

Resources:
  GitHubOidcProviderStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref OidcTemplateUrl

  GitHubPoliciesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref PoliciesTemplateUrl
      Parameters:
        ArtifactBucketName: !Ref ArtifactBucketName

  GitHubRolesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref RolesTemplateUrl
      Parameters:
        GitHubOidcProviderArn: !GetAtt GitHubOidcProviderStack.Outputs.GitHubOidcProviderArn
        GitHubOrg: !Ref GitHubOrg
        GitHubRepo: !Ref GitHubRepo
        GitHubBranch: !Ref GitHubBranch
        InfraRoleName: !Ref InfraRoleName
        AppRoleName: !Ref AppRoleName
        InfraPolicyArn: !GetAtt GitHubPoliciesStack.Outputs.InfraPolicyArn
        AppPolicyArn: !GetAtt GitHubPoliciesStack.Outputs.AppPolicyArn

Outputs:
  GitHubOidcProviderArn:
    Description: ARN of the GitHub OIDC provider
    Value: !GetAtt GitHubOidcProviderStack.Outputs.GitHubOidcProviderArn

  GitHubInfraRoleArn:
    Description: ARN of the infrastructure deployment role
    Value: !GetAtt GitHubRolesStack.Outputs.GitHubInfraRoleArn

  GitHubAppRoleArn:
    Description: ARN of the Lambda application deployment role
    Value: !GetAtt GitHubRolesStack.Outputs.GitHubAppRoleArn
