AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC integration — one policy and one role for one repository

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: OIDC provider
        Parameters:
          - OidcProviderArn
      - Label:
          default: Child templates
        Parameters:
          - PoliciesTemplateUrl
          - RoleTemplateUrl
      - Label:
          default: GitHub repository
        Parameters:
          - GitHubOrg
          - GitHubRepo
          - GitHubBranch
      - Label:
          default: IAM
        Parameters:
          - RoleName
          - PolicyName
      - Label:
          default: Deployment artifacts
        Parameters:
          - ArtifactBucketName
      - Label:
          default: Security scoping
        Parameters:
          - CloudFormationStackNamePrefix
          - CloudFormationExecutionRolePrefix
      - Label:
          default: Tagging
        Parameters:
          - Application
          - Project
          - DeploymentType
          - ManagedBy

Parameters:
  OidcProviderArn:
    Type: String
    Description: ARN of the GitHub Actions OIDC provider (from the GitHub-Actions-OIDC-Provider stack)

  PoliciesTemplateUrl:
    Type: String
    Description: S3 URL of the policies child template

  RoleTemplateUrl:
    Type: String
    Description: S3 URL of the role child template

  GitHubOrg:
    Type: String
    Description: GitHub organization or user name

  GitHubRepo:
    Type: String
    Description: GitHub repository that will assume the role

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume the role

  RoleName:
    Type: String
    Description: IAM role name (e.g. github-app-data-collector or github-infra-data-collector-infra)

  PolicyName:
    Type: String
    Description: Managed policy name — must be unique per stack

  ArtifactBucketName:
    Type: String
    Default: ''
    Description: S3 bucket name for deployment artifacts. Leave empty to omit S3 access.

  CloudFormationStackNamePrefix:
    Type: String
    Description: Restricts CloudFormation actions and IAM role CRUD to stacks with this prefix

  CloudFormationExecutionRolePrefix:
    Type: String
    Description: Restricts iam:PassRole to roles whose names start with this prefix

  Application:
    Type: String
    Description: Application tag — identifies the owning application in AWS Resource Groups (e.g. trading)

  Project:
    Type: String
    Default: github-actions-oidc
    Description: Project tag applied to all resources in this stack

  DeploymentType:
    Type: String
    AllowedValues: [sam, infra]
    Description: Deployment type tag — sam for application stacks, infra for infrastructure stacks

  ManagedBy:
    Type: String
    Default: cloudformation
    Description: ManagedBy tag applied to all resources in this stack

Resources:
  GitHubPoliciesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref PoliciesTemplateUrl
      Parameters:
        PolicyName: !Ref PolicyName
        ArtifactBucketName: !Ref ArtifactBucketName
        CloudFormationStackNamePrefix: !Ref CloudFormationStackNamePrefix
        CloudFormationExecutionRolePrefix: !Ref CloudFormationExecutionRolePrefix

  GitHubRoleStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Ref RoleTemplateUrl
      Parameters:
        GitHubOidcProviderArn: !Ref OidcProviderArn
        GitHubOrg: !Ref GitHubOrg
        GitHubRepo: !Ref GitHubRepo
        GitHubBranch: !Ref GitHubBranch
        RoleName: !Ref RoleName
        PolicyArn: !GetAtt GitHubPoliciesStack.Outputs.PolicyArn

  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub github-actions-${GitHubRepo}
      Description: !Sub GitHub Actions OIDC resources for ${GitHubOrg} ${GitHubRepo}
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::AllSupported
          TagFilters:
            - Key: Application
              Values: [!Ref Application]
            - Key: Project
              Values: [!Ref Project]

Outputs:
  GitHubRoleArn:
    Description: ARN of the deployment role
    Value: !GetAtt GitHubRoleStack.Outputs.GitHubRoleArn

  ResourceGroupArn:
    Description: ARN of the Resource Group for this repository's GitHub Actions resources
    Value: !GetAtt ResourceGroup.Arn

  Application:
    Description: Application tag applied to all resources in this stack
    Value: !Ref Application

  Project:
    Description: Project tag applied to all resources in this stack
    Value: !Ref Project
