AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for GitHub Actions infrastructure deployments

Parameters:
  GitHubOidcProviderArn:
    Type: String
    Description: ARN of the GitHub Actions OIDC provider

  GitHubOrg:
    Type: String
    Description: GitHub organization or user

  GitHubRepo:
    Type: String
    Description: GitHub repository name

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume the role

  UseGitHubEnvironment:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Use a GitHub environment subject instead of a branch subject

  GitHubEnvironmentName:
    Type: String
    Default: prod
    Description: GitHub environment name when UseGitHubEnvironment is true

  RoleName:
    Type: String
    Description: IAM role name (e.g. github-infra-data-collector-infra)

  PolicyArn:
    Type: String
    Description: ARN of the managed policy to attach

Conditions:
  UseEnvironmentSubject: !Equals [!Ref UseGitHubEnvironment, 'true']

Resources:
  GitHubInfraRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: GitHub Actions role for infrastructure deployments
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !If
                  - UseEnvironmentSubject
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironmentName}
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      ManagedPolicyArns:
        - !Ref PolicyArn

Outputs:
  GitHubRoleArn:
    Description: ARN of the infra deployment role
    Value: !GetAtt GitHubInfraRole.Arn
