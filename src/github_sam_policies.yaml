AWSTemplateFormatVersion: '2010-09-09'
Description: IAM managed policies for GitHub Actions SAM deployments (Lambda, API Gateway, EventBridge)

Parameters:
  PolicyName:
    Type: String
    Description: Managed policy name (e.g. github-actions-policy-data-collector)

  CloudFormationStackNamePrefix:
    Type: String
    Description: Stack-name prefix to scope CloudFormation actions and SAM-created IAM roles

  CloudFormationExecutionRolePrefix:
    Type: String
    Description: Name prefix for IAM roles allowed to be passed to CloudFormation as execution roles

  LambdaFunctionArn:
    Type: String
    Default: '*'
    Description: Lambda function ARN allowed for application deployments

  ArtifactBucketName:
    Type: String
    Default: ''
    Description: Optional S3 bucket used to store Lambda artifacts

Conditions:
  HasArtifactBucket: !Not [!Equals [!Ref ArtifactBucketName, '']]

Resources:
  GitHubInfraDeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: Policy for GitHub Actions SAM deployments (Lambda, API Gateway, EventBridge)
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationDeploy
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:ListStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:CreateChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
            Resource: !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${CloudFormationStackNamePrefix}*

          - Sid: SamTransform
            Effect: Allow
            Action:
              - cloudformation:CreateChangeSet
            Resource: !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31

          - Sid: PassCloudFormationExecutionRoles
            Effect: Allow
            Action:
              - iam:PassRole
            Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${CloudFormationExecutionRolePrefix}*

          - Sid: SamLambdaManage
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:PublishVersion
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:ListTags
              - lambda:ListFunctions
              - lambda:TagResource
              - lambda:UntagResource
            Resource: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:*

          - Sid: SamIamManage
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:GetRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:TagRole
              - iam:UntagRole
            Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${CloudFormationStackNamePrefix}*

          - Sid: SamApiGatewayManage
            Effect: Allow
            Action:
              - apigateway:GET
              - apigateway:POST
              - apigateway:PUT
              - apigateway:PATCH
              - apigateway:DELETE
              - apigateway:TagResource
              - apigateway:UntagResource
            Resource:
              - !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/*
              - !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis
              - !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/apis/*
              - !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}::/apis

          - Sid: SamEventBridgeManage
            Effect: Allow
            Action:
              - events:PutRule
              - events:DeleteRule
              - events:DescribeRule
              - events:PutTargets
              - events:RemoveTargets
              - events:ListTargetsByRule
              - events:TagResource
              - events:UntagResource
            Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/*

          - Sid: SamLogsManage
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:DescribeLogGroups
              - logs:PutRetentionPolicy
              - logs:TagResource
            Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*

          - Sid: ReadCallerIdentity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: "*"

          - Sid: S3ArtifactAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !If
              - HasArtifactBucket
              - - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}
                - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*
              - !Ref AWS::NoValue

Outputs:
  PolicyArn:
    Description: ARN of the SAM deployment managed policy
    Value: !Ref GitHubInfraDeployPolicy
