AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for GitHub Actions infrastructure and Lambda deployments

Parameters:
  GitHubOidcProviderArn:
    Type: String
    Description: ARN of the GitHub OIDC provider

  GitHubOrg:
    Type: String
    Default: my-org
    Description: GitHub organization or user

  GitHubRepo:
    Type: String
    Default: my-repo
    Description: GitHub repository name

  GitHubBranch:
    Type: String
    Default: main
    Description: Git branch allowed to assume the roles

  UseGitHubEnvironment:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Whether to use a GitHub environment subject instead of a branch subject

  GitHubEnvironmentName:
    Type: String
    Default: prod
    Description: GitHub environment name when UseGitHubEnvironment is true

  InfraRoleName:
    Type: String
    Default: github-actions-infra-role
    Description: IAM role name for infrastructure deployments

  AppRoleName:
    Type: String
    Default: github-actions-app-role
    Description: IAM role name for Lambda application deployments

  InfraPolicyArn:
    Type: String
    Description: ARN of the infrastructure managed policy

  AppPolicyArn:
    Type: String
    Description: ARN of the application managed policy

Conditions:
  UseEnvironmentSubject: !Equals [!Ref UseGitHubEnvironment, 'true']

Resources:
  GitHubInfraRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref InfraRoleName
      Description: GitHub Actions role for AWS infrastructure deployments
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GitHubOidcAssumeRole
            Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !If
                  - UseEnvironmentSubject
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironmentName}
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      ManagedPolicyArns:
        - !Ref InfraPolicyArn

  GitHubAppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref AppRoleName
      Description: GitHub Actions role for Lambda application deployments
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GitHubOidcAssumeRole
            Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !If
                  - UseEnvironmentSubject
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironmentName}
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      ManagedPolicyArns:
        - !Ref AppPolicyArn

Outputs:
  GitHubInfraRoleArn:
    Description: ARN of the infrastructure deployment role
    Value: !GetAtt GitHubInfraRole.Arn

  GitHubAppRoleArn:
    Description: ARN of the Lambda application deployment role
    Value: !GetAtt GitHubAppRole.Arn